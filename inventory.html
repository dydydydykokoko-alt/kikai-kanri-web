<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>在庫管理 - 機械設備管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-success px-3">
  <span class="navbar-brand"><i class="bi bi-wrench-adjustable me-2"></i>機械設備管理</span>
  <div class="d-none d-md-flex gap-3">
    <a href="index.html"      class="nav-link text-white">ホーム</a>
    <a href="equipment.html"  class="nav-link text-white">機械台帳</a>
    <a href="maintenance.html"class="nav-link text-white">整備</a>
    <a href="inventory.html"  class="nav-link text-white fw-bold">在庫</a>
    <a href="settings.html"   class="nav-link text-white">設定</a>
  </div>
</nav>

<div class="container-fluid px-3 pt-3">
  <div class="page-title"><i class="bi bi-box-seam me-2 text-success"></i>在庫管理</div>
  <div id="content">
    <div class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2"></div>読み込み中...
    </div>
  </div>
</div>

<button class="btn btn-success btn-fab shadow" onclick="openForm()"><i class="bi bi-plus-lg"></i></button>

<nav class="bottom-nav d-md-none">
  <a href="index.html" class="nav-item"><i class="bi bi-house-fill"></i>ホーム</a>
  <a href="equipment.html" class="nav-item"><i class="bi bi-truck"></i>機械</a>
  <a href="maintenance.html" class="nav-item">
    <i class="bi bi-tools"></i>整備
    <span id="overdueBadge" class="badge rounded-pill bg-danger" style="display:none"></span>
  </a>
  <a href="inventory.html" class="nav-item active">
    <i class="bi bi-box-seam"></i>在庫
    <span id="lowstockBadge" class="badge rounded-pill bg-warning" style="display:none"></span>
  </a>
  <a href="menu.html" class="nav-item"><i class="bi bi-grid"></i>メニュー</a>
</nav>

<!-- 在庫フォームモーダル -->
<div class="modal fade" id="formModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h6 class="modal-title" id="formTitle">在庫品を登録</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form>
          <input type="hidden" id="invId">
          <div class="mb-3">
            <label class="form-label fw-bold">品名 <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="invName" required>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label">カテゴリ</label>
              <select class="form-select" id="invCategory">
                <option value="">選択してください</option>
                <option>オイル・液体</option>
                <option>フィルター</option>
                <option>ベルト・チェーン</option>
                <option>タイヤ・チューブ</option>
                <option>バッテリー</option>
                <option>グリス・潤滑剤</option>
                <option>工具・部品</option>
                <option>消耗品</option>
                <option>その他</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">品番</label>
              <input type="text" class="form-control" id="invPartNumber">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">対応機械</label>
            <input type="text" class="form-control" id="invCompatible" placeholder="例: トラクターA, コンバインB">
          </div>
          <div class="row g-2 mb-3">
            <div class="col-4">
              <label class="form-label">単位</label>
              <select class="form-select" id="invUnit">
                <option value="">-</option>
                <option>個</option>
                <option>本</option>
                <option>L</option>
                <option>ml</option>
                <option>kg</option>
                <option>g</option>
                <option>袋</option>
              </select>
            </div>
            <div class="col-4">
              <label class="form-label">現在庫</label>
              <input type="number" class="form-control" id="invCurrentStock" min="0" step="0.1">
            </div>
            <div class="col-4">
              <label class="form-label">最低在庫</label>
              <input type="number" class="form-control" id="invMinStock" min="0" step="0.1">
            </div>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label">単価(円)</label>
              <input type="number" class="form-control" id="invUnitPrice" min="0">
            </div>
            <div class="col-6">
              <label class="form-label">仕入先</label>
              <input type="text" class="form-control" id="invSupplier">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">メモ</label>
            <textarea class="form-control" id="invNotes" rows="2"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-success px-4" onclick="saveInventory()">
          <i class="bi bi-check-lg me-1"></i>保存
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h6 class="modal-title" id="detailTitle">在庫詳細</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailBody"></div>
      <div class="modal-footer">
        <button class="btn btn-outline-danger btn-sm" id="detailDeleteBtn">削除</button>
        <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">閉じる</button>
        <button class="btn btn-success btn-sm" id="detailEditBtn">編集</button>
      </div>
    </div>
  </div>
</div>

<!-- 入出庫モーダル -->
<div class="modal fade" id="transModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header" id="transHeader">
        <h6 class="modal-title" id="transTitle"></h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="transId">
        <input type="hidden" id="transType">
        <div class="mb-3">
          <label class="form-label fw-bold">数量</label>
          <input type="number" class="form-control" id="transQty" min="0.1" step="0.1">
        </div>
        <div class="mb-3">
          <label class="form-label">理由・メモ</label>
          <input type="text" class="form-control" id="transReason">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-success px-4" onclick="doTransaction()">
          <i class="bi bi-check-lg me-1"></i>実行
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 確認ダイアログ -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body py-4 text-center" id="confirmMsg"></div>
      <div class="modal-footer border-0 justify-content-center gap-2">
        <button class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-danger px-4" id="confirmOkBtn">削除する</button>
      </div>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:1100">
  <div id="toast" class="toast align-items-center text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastBody"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
async function loadPage() {
  const content = document.getElementById('content');
  showLoading(content);
  try {
    const list = await API.getInventory();
    if (list.length === 0) {
      content.innerHTML = `<div class="empty-state"><i class="bi bi-box-seam"></i>在庫品がありません</div>`;
      return;
    }
    content.innerHTML = list.map(item => {
      const isLow = Number(item.minimum_stock) > 0 && Number(item.current_stock) <= Number(item.minimum_stock);
      return `
        <div class="list-item">
          <div class="d-flex justify-content-between align-items-start">
            <div onclick="openDetail('${escHtml(item.id)}')" style="cursor:pointer;flex:1">
              <div class="title">${isLow ? '<span class="badge bg-danger me-1">不足</span>' : ''}${escHtml(item.name)}</div>
              <div class="sub">${escHtml(item.category || '')}${item.part_number ? ' / ' + escHtml(item.part_number) : ''}</div>
            </div>
            <div class="text-end">
              <div class="${isLow ? 'stock-low' : 'stock-ok'} fw-bold">${fmtNum(item.current_stock, 1)} ${escHtml(item.unit || '')}</div>
              ${item.minimum_stock ? `<small class="text-muted">最低: ${fmtNum(item.minimum_stock, 1)}</small>` : ''}
            </div>
          </div>
          <div class="d-flex gap-2 mt-2">
            <button class="btn btn-sm btn-outline-success flex-fill" onclick="openTransaction('${escHtml(item.id)}', 'in', '${escHtml(item.name)}')">
              <i class="bi bi-plus me-1"></i>入庫
            </button>
            <button class="btn btn-sm btn-outline-warning flex-fill" onclick="openTransaction('${escHtml(item.id)}', 'out', '${escHtml(item.name)}')">
              <i class="bi bi-dash me-1"></i>出庫
            </button>
          </div>
        </div>`;
    }).join('');
  } catch(e) { showError(content, e.message); }
}

async function openDetail(id) {
  const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('detailModal'));
  document.getElementById('detailBody').innerHTML = '<div class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></div>';
  modal.show();
  try {
    const item = await API.getInventoryById(id);
    document.getElementById('detailTitle').textContent = item.name;
    document.getElementById('detailEditBtn').onclick = () => { modal.hide(); openForm(item); };
    document.getElementById('detailDeleteBtn').onclick = async () => {
      modal.hide();
      if (await confirmDialog(`「${item.name}」を削除しますか？`)) {
        await API.deleteInventory(id);
        showToast('削除しました');
        loadPage();
        updateNavBadges();
      }
    };
    const transRows = item.transactions && item.transactions.length > 0 ?
      item.transactions.map(t => `
        <tr>
          <td>${escHtml(t.transaction_date)}</td>
          <td><span class="badge ${t.type === 'in' ? 'bg-success' : 'bg-warning text-dark'}">${t.type === 'in' ? '入庫' : '出庫'}</span></td>
          <td class="text-end">${fmtNum(t.quantity, 1)}</td>
          <td class="small text-muted">${escHtml(t.reason || '')}</td>
        </tr>`).join('') :
      '<tr><td colspan="4" class="text-center text-muted">履歴なし</td></tr>';

    document.getElementById('detailBody').innerHTML = `
      <table class="table table-sm table-borderless mb-3">
        <tr><th class="text-muted small" width="40%">カテゴリ</th><td>${escHtml(item.category || '-')}</td></tr>
        <tr><th class="text-muted small">品番</th><td>${escHtml(item.part_number || '-')}</td></tr>
        <tr><th class="text-muted small">対応機械</th><td>${escHtml(item.compatible_machines || '-')}</td></tr>
        <tr><th class="text-muted small">現在庫</th><td class="fw-bold">${fmtNum(item.current_stock, 1)} ${escHtml(item.unit || '')}</td></tr>
        <tr><th class="text-muted small">最低在庫</th><td>${fmtNum(item.minimum_stock, 1)} ${escHtml(item.unit || '')}</td></tr>
        <tr><th class="text-muted small">単価</th><td>${item.unit_price ? '¥' + fmtNum(item.unit_price) : '-'}</td></tr>
        <tr><th class="text-muted small">仕入先</th><td>${escHtml(item.supplier || '-')}</td></tr>
      </table>
      <div class="section-header"><h6><i class="bi bi-clock-history me-1"></i>入出庫履歴</h6></div>
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>日付</th><th>種別</th><th class="text-end">数量</th><th>理由</th></tr></thead>
          <tbody>${transRows}</tbody>
        </table>
      </div>`;
  } catch(e) {
    document.getElementById('detailBody').innerHTML = `<div class="alert alert-danger">${escHtml(e.message)}</div>`;
  }
}

function openForm(item = null) {
  document.getElementById('formTitle').textContent = item ? '在庫品を編集' : '在庫品を登録';
  document.getElementById('invId').value           = item ? item.id : '';
  document.getElementById('invName').value         = item ? item.name : '';
  document.getElementById('invCategory').value     = item ? item.category : '';
  document.getElementById('invPartNumber').value   = item ? item.part_number : '';
  document.getElementById('invCompatible').value   = item ? item.compatible_machines : '';
  document.getElementById('invUnit').value         = item ? item.unit : '';
  document.getElementById('invCurrentStock').value = item ? item.current_stock : '';
  document.getElementById('invMinStock').value     = item ? item.minimum_stock : '';
  document.getElementById('invUnitPrice').value    = item ? item.unit_price : '';
  document.getElementById('invSupplier').value     = item ? item.supplier : '';
  document.getElementById('invNotes').value        = item ? item.notes : '';
  bootstrap.Modal.getOrCreateInstance(document.getElementById('formModal')).show();
}

async function saveInventory() {
  const name = document.getElementById('invName').value.trim();
  if (!name) { alert('品名を入力してください'); return; }
  try {
    await API.saveInventory({
      id:              document.getElementById('invId').value,
      name,
      category:        document.getElementById('invCategory').value,
      part_number:     document.getElementById('invPartNumber').value,
      compatible_machines: document.getElementById('invCompatible').value,
      unit:            document.getElementById('invUnit').value,
      current_stock:   document.getElementById('invCurrentStock').value,
      minimum_stock:   document.getElementById('invMinStock').value,
      unit_price:      document.getElementById('invUnitPrice').value,
      supplier:        document.getElementById('invSupplier').value,
      notes:           document.getElementById('invNotes').value,
    });
    bootstrap.Modal.getOrCreateInstance(document.getElementById('formModal')).hide();
    showToast('保存しました');
    loadPage();
    updateNavBadges();
  } catch(e) { alert('保存エラー: ' + e.message); }
}

function openTransaction(id, type, name) {
  document.getElementById('transId').value = id;
  document.getElementById('transType').value = type;
  document.getElementById('transTitle').textContent = (type === 'in' ? '入庫' : '出庫') + ': ' + name;
  document.getElementById('transHeader').className = 'modal-header ' + (type === 'in' ? 'bg-success text-white' : 'bg-warning');
  document.getElementById('transQty').value = '';
  document.getElementById('transReason').value = '';
  bootstrap.Modal.getOrCreateInstance(document.getElementById('transModal')).show();
}

async function doTransaction() {
  const id = document.getElementById('transId').value;
  const type = document.getElementById('transType').value;
  const qty = document.getElementById('transQty').value;
  const reason = document.getElementById('transReason').value;
  if (!qty || Number(qty) <= 0) { alert('数量を入力してください'); return; }
  try {
    if (type === 'in') await API.inventoryIn(id, qty, reason);
    else await API.inventoryOut(id, qty, reason);
    bootstrap.Modal.getOrCreateInstance(document.getElementById('transModal')).hide();
    showToast(type === 'in' ? '入庫しました' : '出庫しました');
    loadPage();
    updateNavBadges();
  } catch(e) { alert(e.message); }
}

loadPage();
</script>
</body>
</html>
