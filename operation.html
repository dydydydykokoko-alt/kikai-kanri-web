<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>稼働・燃料記録 - 機械設備管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-success px-3">
  <span class="navbar-brand"><i class="bi bi-wrench-adjustable me-2"></i>機械設備管理</span>
  <div class="d-none d-md-flex gap-3">
    <a href="index.html"       class="nav-link text-white">ホーム</a>
    <a href="equipment.html"   class="nav-link text-white">機械台帳</a>
    <a href="maintenance.html" class="nav-link text-white">整備</a>
    <a href="inventory.html"   class="nav-link text-white">在庫</a>
    <a href="settings.html"    class="nav-link text-white">設定</a>
  </div>
</nav>

<div class="container-fluid px-3 pt-3">
  <div class="page-title"><i class="bi bi-activity me-2 text-success"></i>稼働・燃料記録</div>
  <ul class="nav nav-pills nav-fill mb-3">
    <li class="nav-item"><a class="nav-link active" data-tab="operation" href="#">稼働記録</a></li>
    <li class="nav-item"><a class="nav-link" data-tab="fuel" href="#">燃料記録</a></li>
  </ul>
  <div id="content">
    <div class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2"></div>読み込み中...
    </div>
  </div>
</div>

<button class="btn btn-success btn-fab shadow" onclick="openForm()"><i class="bi bi-plus-lg"></i></button>

<nav class="bottom-nav d-md-none">
  <a href="index.html" class="nav-item"><i class="bi bi-house-fill"></i>ホーム</a>
  <a href="equipment.html" class="nav-item"><i class="bi bi-truck"></i>機械</a>
  <a href="maintenance.html" class="nav-item">
    <i class="bi bi-tools"></i>整備
    <span id="overdueBadge" class="badge rounded-pill bg-danger" style="display:none"></span>
  </a>
  <a href="inventory.html" class="nav-item">
    <i class="bi bi-box-seam"></i>在庫
    <span id="lowstockBadge" class="badge rounded-pill bg-warning" style="display:none"></span>
  </a>
  <a href="menu.html" class="nav-item active"><i class="bi bi-grid"></i>メニュー</a>
</nav>

<!-- フォームモーダル -->
<div class="modal fade" id="formModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h6 class="modal-title" id="formTitle">稼働記録を追加</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="recId">
        <input type="hidden" id="recFormType" value="operation">
        <div class="mb-3">
          <label class="form-label fw-bold">機械 <span class="text-danger">*</span></label>
          <select class="form-select" id="recEquipment" required></select>
        </div>
        <!-- 稼働記録フィールド -->
        <div id="opFields">
          <div class="mb-3">
            <label class="form-label fw-bold">日付 <span class="text-danger">*</span></label>
            <input type="date" class="form-control" id="opDate">
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label">開始時間(h)</label>
              <input type="number" class="form-control" id="opHoursStart" min="0" step="0.1">
            </div>
            <div class="col-6">
              <label class="form-label">終了時間(h)</label>
              <input type="number" class="form-control" id="opHoursEnd" min="0" step="0.1">
            </div>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label">オペレーター</label>
              <input type="text" class="form-control" id="opOperator">
            </div>
            <div class="col-6">
              <label class="form-label">作業種類</label>
              <input type="text" class="form-control" id="opWorkType" placeholder="例: 代掻き">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">圃場名</label>
            <input type="text" class="form-control" id="opFieldName">
          </div>
        </div>
        <!-- 燃料記録フィールド -->
        <div id="fuelFields" style="display:none">
          <div class="mb-3">
            <label class="form-label fw-bold">給油日 <span class="text-danger">*</span></label>
            <input type="date" class="form-control" id="fuelDate">
          </div>
          <div class="mb-3">
            <label class="form-label">燃料種別</label>
            <select class="form-select" id="fuelType"></select>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label">給油量(L)</label>
              <input type="number" class="form-control" id="fuelQty" min="0" step="0.1" oninput="calcFuelTotal()">
            </div>
            <div class="col-6">
              <label class="form-label">単価(円/L)</label>
              <input type="number" class="form-control" id="fuelUnitPrice" min="0" oninput="calcFuelTotal()">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">金額(円)</label>
            <input type="number" class="form-control" id="fuelTotal" min="0">
          </div>
          <div class="mb-3">
            <label class="form-label">給油時アワー(h)</label>
            <input type="number" class="form-control" id="fuelHours" min="0" step="0.1">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">メモ</label>
          <textarea class="form-control" id="recNotes" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-success px-4" onclick="saveRecord()">
          <i class="bi bi-check-lg me-1"></i>保存
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 確認ダイアログ -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body py-4 text-center" id="confirmMsg"></div>
      <div class="modal-footer border-0 justify-content-center gap-2">
        <button class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-danger px-4" id="confirmOkBtn">削除する</button>
      </div>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:1100">
  <div id="toast" class="toast align-items-center text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastBody"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
let masters = null;
let equipmentList = null;
let currentTab = 'operation';

document.querySelectorAll('[data-tab]').forEach(el => {
  el.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('[data-tab]').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentTab = el.dataset.tab;
    loadContent();
  });
});

async function loadPage() {
  masters = await getMasters();
  equipmentList = await API.getEquipment();
  await loadContent();
}

async function loadContent() {
  if (currentTab === 'operation') await loadOps();
  else await loadFuel();
}

async function loadOps() {
  const content = document.getElementById('content');
  showLoading(content);
  try {
    const list = await API.getOperations({ limit: 50 });
    if (list.length === 0) {
      content.innerHTML = `<div class="empty-state"><i class="bi bi-activity"></i>稼働記録がありません</div>`;
      return;
    }
    content.innerHTML = list.map(op => {
      const hrs = (op.hours_start !== '' && op.hours_end !== '') ?
        (Number(op.hours_end) - Number(op.hours_start)).toFixed(1) + 'h使用' : '';
      return `
        <div class="list-item">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="title">${escHtml(op.equipment_name)}</div>
              <div class="sub">${escHtml(op.work_type || '')}${op.field_name ? ' / ' + escHtml(op.field_name) : ''}</div>
            </div>
            <div class="text-end">
              <small class="text-muted d-block">${escHtml(op.log_date)}</small>
              ${hrs ? `<span class="hours-badge">${hrs}</span>` : ''}
            </div>
          </div>
          <div class="d-flex justify-content-end mt-1">
            <button class="btn btn-sm btn-outline-danger" onclick="deleteOp('${escHtml(op.id)}')">削除</button>
          </div>
        </div>`;
    }).join('');
  } catch(e) { showError(content, e.message); }
}

async function loadFuel() {
  const content = document.getElementById('content');
  showLoading(content);
  try {
    const list = await API.getFuel({ limit: 50 });
    if (list.length === 0) {
      content.innerHTML = `<div class="empty-state"><i class="bi bi-fuel-pump"></i>燃料記録がありません</div>`;
      return;
    }
    content.innerHTML = list.map(f => `
      <div class="list-item">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="title">${escHtml(f.equipment_name)}</div>
            <div class="sub">${escHtml(f.fuel_type_name || '')} ${f.quantity_liters ? fmtNum(f.quantity_liters, 1) + 'L' : ''}</div>
          </div>
          <div class="text-end">
            <small class="text-muted d-block">${escHtml(f.log_date)}</small>
            ${f.total_cost ? `<small class="text-success">¥${fmtNum(f.total_cost)}</small>` : ''}
          </div>
        </div>
        <div class="d-flex justify-content-end mt-1">
          <button class="btn btn-sm btn-outline-danger" onclick="deleteFuel('${escHtml(f.id)}')">削除</button>
        </div>
      </div>`).join('');
  } catch(e) { showError(content, e.message); }
}

function calcFuelTotal() {
  const qty = Number(document.getElementById('fuelQty').value) || 0;
  const price = Number(document.getElementById('fuelUnitPrice').value) || 0;
  if (qty && price) document.getElementById('fuelTotal').value = Math.round(qty * price);
}

async function openForm() {
  const isOp = currentTab === 'operation';
  document.getElementById('recFormType').value = isOp ? 'operation' : 'fuel';
  document.getElementById('formTitle').textContent = isOp ? '稼働記録を追加' : '燃料記録を追加';
  document.getElementById('opFields').style.display   = isOp ? '' : 'none';
  document.getElementById('fuelFields').style.display = isOp ? 'none' : '';
  document.getElementById('opDate').value   = today();
  document.getElementById('fuelDate').value = today();
  document.getElementById('recId').value    = '';

  const opts = '<option value="">機械を選択</option>' + buildOptions(equipmentList, 'id', 'name', '');
  document.getElementById('recEquipment').innerHTML = opts;

  if (!isOp) {
    document.getElementById('fuelType').innerHTML =
      '<option value="">-</option>' + buildOptions(masters.fuel_types, 'id', 'name', '');
  }
  bootstrap.Modal.getOrCreateInstance(document.getElementById('formModal')).show();
}

async function saveRecord() {
  const type = document.getElementById('recFormType').value;
  const equip = document.getElementById('recEquipment').value;
  if (!equip) { alert('機械を選択してください'); return; }
  try {
    if (type === 'operation') {
      const date = document.getElementById('opDate').value;
      if (!date) { alert('日付を入力してください'); return; }
      await API.saveOperation({
        equipment_id: equip,
        log_date: date,
        hours_start: document.getElementById('opHoursStart').value,
        hours_end:   document.getElementById('opHoursEnd').value,
        operator:    document.getElementById('opOperator').value,
        work_type:   document.getElementById('opWorkType').value,
        field_name:  document.getElementById('opFieldName').value,
        notes:       document.getElementById('recNotes').value,
      });
    } else {
      const date = document.getElementById('fuelDate').value;
      if (!date) { alert('給油日を入力してください'); return; }
      await API.saveFuel({
        equipment_id:    equip,
        log_date:        date,
        fuel_type_id:    document.getElementById('fuelType').value,
        quantity_liters: document.getElementById('fuelQty').value,
        unit_price:      document.getElementById('fuelUnitPrice').value,
        total_cost:      document.getElementById('fuelTotal').value,
        hours_at_fill:   document.getElementById('fuelHours').value,
        notes:           document.getElementById('recNotes').value,
      });
    }
    bootstrap.Modal.getOrCreateInstance(document.getElementById('formModal')).hide();
    showToast('保存しました');
    loadContent();
  } catch(e) { alert('保存エラー: ' + e.message); }
}

async function deleteOp(id) {
  if (!await confirmDialog('この稼働記録を削除しますか？')) return;
  await API.deleteOperation(id);
  showToast('削除しました');
  loadOps();
}

async function deleteFuel(id) {
  if (!await confirmDialog('この燃料記録を削除しますか？')) return;
  await API.deleteFuel(id);
  showToast('削除しました');
  loadFuel();
}

loadPage();
</script>
</body>
</html>
