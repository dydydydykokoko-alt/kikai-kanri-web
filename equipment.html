<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>機械台帳 - 機械設備管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
.equip-card {
  border-radius: 14px; overflow: hidden; background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.09); cursor: pointer;
  transition: box-shadow .15s, transform .15s; height: 100%;
}
.equip-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.15); transform: translateY(-2px); }
.equip-card .photo-area {
  width: 100%; aspect-ratio: 4/3;
  background: #f0f4f0;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.equip-card .photo-area img { width:100%; height:100%; object-fit:cover; }
.equip-card .photo-area .no-photo { color:#c8d6c8; font-size:2.5rem; }
.equip-card .card-body { padding: 10px 12px 12px; }
.equip-card .eq-name { font-weight:700; font-size:.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.equip-card .eq-type { font-size:.73rem; color:#6c757d; }
.equip-card .eq-hours { font-size:.78rem; color:#198754; font-weight:600; }

/* 写真アップロードエリア */
.photo-upload-area {
  border: 2px dashed #dee2e6;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  position: relative;
}
.photo-upload-area:hover { border-color: #198754; background: #f8fff8; }
.photo-upload-area.has-photo { border-style: solid; border-color: #198754; }
.photo-upload-area img { max-height: 200px; border-radius: 8px; }
.photo-upload-area .upload-hint { color: #6c757d; font-size: .85rem; margin-top: 8px; }
</style>
</head>
<body>

<nav class="navbar navbar-dark bg-success px-3">
  <span class="navbar-brand"><i class="bi bi-wrench-adjustable me-2"></i>機械設備管理</span>
  <div class="d-none d-md-flex gap-3">
    <a href="index.html"      class="nav-link text-white" data-nav="index.html">ホーム</a>
    <a href="equipment.html"  class="nav-link text-white fw-bold" data-nav="equipment.html">機械台帳</a>
    <a href="maintenance.html"class="nav-link text-white" data-nav="maintenance.html">整備</a>
    <a href="inventory.html"  class="nav-link text-white" data-nav="inventory.html">在庫</a>
    <a href="settings.html"   class="nav-link text-white" data-nav="settings.html">設定</a>
  </div>
</nav>

<div class="container-fluid px-3 pt-3">
  <div class="d-flex align-items-center justify-content-between mb-2">
    <div class="page-title mb-0"><i class="bi bi-truck me-2 text-success"></i>機械台帳</div>
  </div>
  <div class="mb-3">
    <select class="form-select form-select-sm" id="typeFilter" style="max-width:200px">
      <option value="">すべての種別</option>
    </select>
  </div>
  <div id="content">
    <div class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2"></div>読み込み中...
    </div>
  </div>
</div>

<button class="btn btn-success btn-fab shadow" onclick="openForm()"><i class="bi bi-plus-lg"></i></button>

<nav class="bottom-nav d-md-none">
  <a href="index.html" class="nav-item" data-nav="index.html"><i class="bi bi-house-fill"></i>ホーム</a>
  <a href="equipment.html" class="nav-item active" data-nav="equipment.html"><i class="bi bi-truck"></i>機械</a>
  <a href="maintenance.html" class="nav-item" data-nav="maintenance.html">
    <i class="bi bi-tools"></i>整備
    <span id="overdueBadge" class="badge rounded-pill bg-danger" style="display:none"></span>
  </a>
  <a href="inventory.html" class="nav-item" data-nav="inventory.html">
    <i class="bi bi-box-seam"></i>在庫
    <span id="lowstockBadge" class="badge rounded-pill bg-warning" style="display:none"></span>
  </a>
  <a href="menu.html" class="nav-item" data-nav="menu.html"><i class="bi bi-grid"></i>メニュー</a>
</nav>

<!-- 機械フォームモーダル -->
<div class="modal fade" id="formModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h6 class="modal-title" id="formTitle">機械を登録</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="equipForm">
          <input type="hidden" id="equipId">

          <!-- 写真アップロード -->
          <div class="mb-3">
            <label class="form-label fw-bold"><i class="bi bi-camera me-1"></i>写真</label>
            <div class="photo-upload-area" id="photoUploadArea" onclick="document.getElementById('photoInput').click()">
              <div id="photoPreview">
                <i class="bi bi-camera-fill" style="font-size:2.5rem;color:#ced4da"></i>
                <div class="upload-hint">タップして写真を選択<br><small>カメラで撮影またはアルバムから選択</small></div>
              </div>
              <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="previewPhoto(this)">
            </div>
            <input type="hidden" id="photoDataUrl">
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">機械名 <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="equipName" required placeholder="例: トラクターA">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">機械種別</label>
            <select class="form-select" id="equipMachineType">
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label">メーカー</label>
              <input type="text" class="form-control" id="equipManufacturer" placeholder="例: クボタ">
            </div>
            <div class="col-6">
              <label class="form-label">型番</label>
              <input type="text" class="form-control" id="equipModelNumber">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">シリアル番号</label>
            <input type="text" class="form-control" id="equipSerial">
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label">購入日</label>
              <input type="date" class="form-control" id="equipPurchaseDate">
            </div>
            <div class="col-6">
              <label class="form-label">購入金額(円)</label>
              <input type="number" class="form-control" id="equipPurchasePrice" min="0">
            </div>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label">現在時間(h)</label>
              <input type="number" class="form-control" id="equipCurrentHours" min="0" step="0.1">
            </div>
            <div class="col-6">
              <label class="form-label">燃料種別</label>
              <select class="form-select" id="equipFuelType">
                <option value="">-</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">タンク容量(L)</label>
            <input type="number" class="form-control" id="equipTankCapacity" min="0" step="0.1">
          </div>
          <div class="mb-3">
            <label class="form-label">備考</label>
            <textarea class="form-control" id="equipNotes" rows="2"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-success px-4" id="saveBtn" onclick="saveEquipment()">
          <i class="bi bi-check-lg me-1"></i>保存
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h6 class="modal-title" id="detailTitle">機械詳細</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailBody">
        <div class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-danger btn-sm" id="detailDeleteBtn">削除</button>
        <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">閉じる</button>
        <button class="btn btn-success btn-sm" id="detailEditBtn">編集</button>
      </div>
    </div>
  </div>
</div>

<!-- 確認ダイアログ -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body py-4 text-center" id="confirmMsg"></div>
      <div class="modal-footer border-0 justify-content-center gap-2">
        <button class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-danger px-4" id="confirmOkBtn">削除する</button>
      </div>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:1100">
  <div id="toast" class="toast align-items-center text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastBody"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
let masters = null;

async function loadPage() {
  masters = await getMasters();
  const filter = document.getElementById('typeFilter');
  filter.innerHTML = '<option value="">すべての種別</option>' +
    masters.machine_types.map(t => `<option value="${escHtml(t.id)}">${escHtml(t.name)}</option>`).join('');
  filter.onchange = loadList;

  // URLハッシュで詳細を直接開く対応
  const hash = location.hash.replace('#', '');
  await loadList();
  if (hash) openDetail(hash);
}

async function loadList() {
  const content = document.getElementById('content');
  showLoading(content);
  try {
    const typeId = document.getElementById('typeFilter').value;
    const list = await API.getEquipment(typeId ? { type_id: typeId } : {});
    if (list.length === 0) {
      content.innerHTML = `<div class="empty-state"><i class="bi bi-truck"></i>機械が登録されていません<br>
        <a href="#" class="btn btn-success btn-sm mt-2" onclick="openForm();return false"><i class="bi bi-plus-lg me-1"></i>機械を登録する</a></div>`;
      return;
    }
    // カードグリッド表示
    content.innerHTML = `<div class="row g-2">${list.map(eq => {
      const photoHtml = eq.photo_url
        ? `<img src="${escHtml(eq.photo_url)}" alt="${escHtml(eq.name)}" loading="lazy">`
        : `<i class="bi bi-truck no-photo"></i>`;
      return `
        <div class="col-6 col-md-4 col-lg-3">
          <div class="equip-card" onclick="openDetail('${escHtml(eq.id)}')">
            <div class="photo-area">${photoHtml}</div>
            <div class="card-body">
              <div class="eq-name" title="${escHtml(eq.name)}">${escHtml(eq.name)}</div>
              <div class="eq-type">${escHtml(eq.machine_type_name || '-')}${eq.manufacturer ? ' / ' + escHtml(eq.manufacturer) : ''}</div>
              ${eq.current_hours ? `<div class="eq-hours"><i class="bi bi-speedometer2 me-1"></i>${fmtNum(eq.current_hours,1)} h</div>` : ''}
            </div>
          </div>
        </div>`;
    }).join('')}</div>`;
  } catch(e) { showError(content, e.message); }
}

async function openDetail(id) {
  const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('detailModal'));
  document.getElementById('detailBody').innerHTML = '<div class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></div>';
  modal.show();
  try {
    const eq = await API.getEquipmentById(id);
    document.getElementById('detailTitle').textContent = eq.name;
    document.getElementById('detailEditBtn').onclick = () => { modal.hide(); openForm(eq); };
    document.getElementById('detailDeleteBtn').onclick = async () => {
      modal.hide();
      if (await confirmDialog(`「${eq.name}」を削除しますか？`)) {
        await API.deleteEquipment(id);
        showToast('削除しました');
        loadList();
      }
    };

    const photoHtml = eq.photo_url
      ? `<div class="mb-3 text-center">
           <img src="${escHtml(eq.photo_url)}" class="img-fluid rounded-3" style="max-height:240px;object-fit:cover;width:100%" alt="${escHtml(eq.name)}">
         </div>`
      : '';

    const schedRows = eq.schedules && eq.schedules.length > 0
      ? eq.schedules.map(s => `
          <div class="d-flex justify-content-between py-1 border-bottom">
            <span class="${s.isOverdue ? 'text-danger' : ''}">${escHtml(s.maintenance_type_name)}</span>
            <small class="${s.isOverdue ? 'text-danger fw-bold' : 'text-muted'}">${escHtml(s.scheduled_date)}</small>
          </div>`).join('')
      : '<div class="text-muted small py-1">なし</div>';

    const maintRows = eq.recentMaint && eq.recentMaint.length > 0
      ? eq.recentMaint.map(r => `
          <div class="d-flex justify-content-between py-1 border-bottom">
            <span>${escHtml(r.maintenance_type_name)}</span>
            <small class="text-muted">${escHtml(r.record_date)}</small>
          </div>`).join('')
      : '<div class="text-muted small py-1">なし</div>';

    document.getElementById('detailBody').innerHTML = `
      ${photoHtml}
      <table class="table table-sm table-borderless mb-3">
        <tr><th class="text-muted small" width="40%">種別</th><td>${escHtml(eq.machine_type_name || '-')}</td></tr>
        <tr><th class="text-muted small">メーカー</th><td>${escHtml(eq.manufacturer || '-')}</td></tr>
        <tr><th class="text-muted small">型番</th><td>${escHtml(eq.model_number || '-')}</td></tr>
        <tr><th class="text-muted small">シリアル</th><td>${escHtml(eq.serial_number || '-')}</td></tr>
        <tr><th class="text-muted small">購入日</th><td>${escHtml(eq.purchase_date || '-')}</td></tr>
        <tr><th class="text-muted small">アワーメーター</th><td><span class="hours-badge">${eq.current_hours ? fmtNum(eq.current_hours,1) + ' h' : '-'}</span></td></tr>
        <tr><th class="text-muted small">燃料</th><td>${escHtml(eq.fuel_type_name || '-')}</td></tr>
        ${eq.notes ? `<tr><th class="text-muted small">備考</th><td>${escHtml(eq.notes)}</td></tr>` : ''}
      </table>
      <div class="section-header"><h6><i class="bi bi-calendar-check me-1"></i>整備スケジュール</h6></div>
      <div class="mb-3">${schedRows}</div>
      <div class="section-header"><h6><i class="bi bi-tools me-1"></i>最近の整備履歴</h6></div>
      <div>${maintRows}</div>`;
  } catch(e) {
    document.getElementById('detailBody').innerHTML = `<div class="alert alert-danger">${escHtml(e.message)}</div>`;
  }
}

async function openForm(eq = null) {
  if (!masters) masters = await getMasters();
  document.getElementById('formTitle').textContent = eq ? '機械を編集' : '機械を登録';
  document.getElementById('equipId').value           = eq ? eq.id : '';
  document.getElementById('equipName').value         = eq ? eq.name : '';
  document.getElementById('equipManufacturer').value = eq ? eq.manufacturer : '';
  document.getElementById('equipModelNumber').value  = eq ? eq.model_number : '';
  document.getElementById('equipSerial').value       = eq ? eq.serial_number : '';
  document.getElementById('equipPurchaseDate').value = eq ? eq.purchase_date : '';
  document.getElementById('equipPurchasePrice').value= eq ? eq.purchase_price : '';
  document.getElementById('equipCurrentHours').value = eq ? eq.current_hours : '';
  document.getElementById('equipTankCapacity').value = eq ? eq.fuel_tank_capacity : '';
  document.getElementById('equipNotes').value        = eq ? eq.notes : '';
  document.getElementById('photoDataUrl').value      = '';

  // 写真プレビュー
  const area = document.getElementById('photoUploadArea');
  if (eq && eq.photo_url) {
    document.getElementById('photoPreview').innerHTML =
      `<img src="${eq.photo_url}" class="img-fluid rounded" style="max-height:180px">
       <div class="upload-hint mt-2">タップして写真を変更</div>`;
    area.classList.add('has-photo');
  } else {
    document.getElementById('photoPreview').innerHTML =
      `<i class="bi bi-camera-fill" style="font-size:2.5rem;color:#ced4da"></i>
       <div class="upload-hint">タップして写真を選択<br><small>カメラで撮影またはアルバムから選択</small></div>`;
    area.classList.remove('has-photo');
  }

  document.getElementById('equipMachineType').innerHTML =
    '<option value="">選択してください</option>' +
    buildOptions(masters.machine_types, 'id', 'name', eq ? eq.machine_type_id : '');
  document.getElementById('equipFuelType').innerHTML =
    '<option value="">-</option>' +
    buildOptions(masters.fuel_types, 'id', 'name', eq ? eq.fuel_type_id : '');

  bootstrap.Modal.getOrCreateInstance(document.getElementById('formModal')).show();
}

// 写真プレビュー＆圧縮（スプレッドシート保存用に小さく圧縮）
function previewPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      // 最大500px・品質0.65に圧縮（スプレッドシートセルに収まるサイズ）
      const MAX = 500;
      let w = img.width, h = img.height;
      if (w > h) { h = Math.round(h * Math.min(MAX,w) / w); w = Math.min(MAX,w); }
      else        { w = Math.round(w * Math.min(MAX,h) / h); h = Math.min(MAX,h); }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.65);

      document.getElementById('photoDataUrl').value = dataUrl;
      document.getElementById('photoPreview').innerHTML =
        `<img src="${dataUrl}" class="img-fluid rounded" style="max-height:180px">
         <div class="upload-hint mt-2">タップして写真を変更</div>`;
      document.getElementById('photoUploadArea').classList.add('has-photo');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveEquipment() {
  const name = document.getElementById('equipName').value.trim();
  if (!name) { alert('機械名を入力してください'); return; }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>保存中...';

  const photoDataUrl = document.getElementById('photoDataUrl').value;
  const data = {
    id:              document.getElementById('equipId').value,
    name,
    machine_type_id: document.getElementById('equipMachineType').value,
    manufacturer:    document.getElementById('equipManufacturer').value,
    model_number:    document.getElementById('equipModelNumber').value,
    serial_number:   document.getElementById('equipSerial').value,
    purchase_date:   document.getElementById('equipPurchaseDate').value,
    purchase_price:  document.getElementById('equipPurchasePrice').value,
    current_hours:   document.getElementById('equipCurrentHours').value,
    fuel_type_id:    document.getElementById('equipFuelType').value,
    fuel_tank_capacity: document.getElementById('equipTankCapacity').value,
    notes:           document.getElementById('equipNotes').value,
    // 写真あり→新しいDataURL、写真なし変更なし→undefined（既存保持）
    photo_url: photoDataUrl || undefined,
  };

  try {
    await API.saveEquipment(data);
    bootstrap.Modal.getOrCreateInstance(document.getElementById('formModal')).hide();
    showToast(data.id ? '更新しました' : '登録しました');
    loadList();
  } catch(e) {
    alert('保存エラー: ' + e.message);
  } finally {
    saveBtn.disabled = false;
    saveBtn.innerHTML = '<i class="bi bi-check-lg me-1"></i>保存';
  }
}

loadPage();
</script>
</body>
</html>
