<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>メニュー - 機械設備管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-success px-3">
  <span class="navbar-brand"><i class="bi bi-wrench-adjustable me-2"></i>機械設備管理</span>
</nav>

<div class="container-fluid px-3 pt-3">
  <div class="page-title"><i class="bi bi-grid me-2 text-success"></i>メニュー</div>

  <div class="row g-3 mt-1">
    <div class="col-6">
      <a href="index.html" class="card text-decoration-none text-dark">
        <div class="card-body text-center py-4">
          <i class="bi bi-speedometer2 text-success" style="font-size:2rem"></i>
          <div class="mt-2 fw-bold">ダッシュボード</div>
        </div>
      </a>
    </div>
    <div class="col-6">
      <a href="equipment.html" class="card text-decoration-none text-dark">
        <div class="card-body text-center py-4">
          <i class="bi bi-truck text-primary" style="font-size:2rem"></i>
          <div class="mt-2 fw-bold">機械台帳</div>
        </div>
      </a>
    </div>
    <div class="col-6">
      <a href="maintenance.html" class="card text-decoration-none text-dark">
        <div class="card-body text-center py-4">
          <i class="bi bi-tools text-warning" style="font-size:2rem"></i>
          <div class="mt-2 fw-bold">整備記録</div>
        </div>
      </a>
    </div>
    <div class="col-6">
      <a href="maintenance.html" class="card text-decoration-none text-dark" onclick="localStorage.setItem('maintTab','schedules')">
        <div class="card-body text-center py-4">
          <i class="bi bi-calendar-check text-danger" style="font-size:2rem"></i>
          <div class="mt-2 fw-bold">整備スケジュール</div>
        </div>
      </a>
    </div>
    <div class="col-6">
      <a href="operation.html" class="card text-decoration-none text-dark">
        <div class="card-body text-center py-4">
          <i class="bi bi-activity text-success" style="font-size:2rem"></i>
          <div class="mt-2 fw-bold">稼働記録</div>
        </div>
      </a>
    </div>
    <div class="col-6">
      <a href="operation.html" class="card text-decoration-none text-dark" onclick="localStorage.setItem('opTab','fuel')">
        <div class="card-body text-center py-4">
          <i class="bi bi-fuel-pump text-secondary" style="font-size:2rem"></i>
          <div class="mt-2 fw-bold">燃料記録</div>
        </div>
      </a>
    </div>
    <div class="col-6">
      <a href="inventory.html" class="card text-decoration-none text-dark">
        <div class="card-body text-center py-4">
          <i class="bi bi-box-seam text-info" style="font-size:2rem"></i>
          <div class="mt-2 fw-bold">在庫管理</div>
        </div>
      </a>
    </div>
    <div class="col-6">
      <a href="settings.html" class="card text-decoration-none text-dark">
        <div class="card-body text-center py-4">
          <i class="bi bi-gear text-secondary" style="font-size:2rem"></i>
          <div class="mt-2 fw-bold">設定</div>
        </div>
      </a>
    </div>
  </div>

<nav class="bottom-nav d-md-none">
  <a href="index.html" class="nav-item"><i class="bi bi-house-fill"></i>ホーム</a>
  <a href="equipment.html" class="nav-item"><i class="bi bi-truck"></i>機械</a>
  <a href="maintenance.html" class="nav-item">
    <i class="bi bi-tools"></i>整備
    <span id="overdueBadge" class="badge rounded-pill bg-danger" style="display:none"></span>
  </a>
  <a href="inventory.html" class="nav-item">
    <i class="bi bi-box-seam"></i>在庫
    <span id="lowstockBadge" class="badge rounded-pill bg-warning" style="display:none"></span>
  </a>
  <a href="menu.html" class="nav-item active"><i class="bi bi-grid"></i>メニュー</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>

</html>
