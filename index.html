<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>機械設備管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- トップナビ -->
<nav class="navbar navbar-dark bg-success px-3">
  <span class="navbar-brand"><i class="bi bi-wrench-adjustable me-2"></i>機械設備管理</span>
  <div class="d-none d-md-flex gap-3">
    <a href="index.html"      class="nav-link text-white" data-nav="index.html">ホーム</a>
    <a href="equipment.html"  class="nav-link text-white" data-nav="equipment.html">機械台帳</a>
    <a href="maintenance.html"class="nav-link text-white" data-nav="maintenance.html">整備</a>
    <a href="inventory.html"  class="nav-link text-white" data-nav="inventory.html">在庫</a>
    <a href="settings.html"   class="nav-link text-white" data-nav="settings.html">設定</a>
  </div>
</nav>

<!-- コンテンツ -->
<div class="container-fluid px-3 pt-3">
  <div class="page-title"><i class="bi bi-speedometer2 me-2 text-success"></i>ダッシュボード</div>
  <div id="content">
    <div class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2" role="status"></div>読み込み中...
    </div>
  </div>
</div>

<!-- 下タブバー -->
<nav class="bottom-nav d-md-none">
  <a href="index.html" class="nav-item" data-nav="index.html">
    <i class="bi bi-house-fill"></i>ホーム
  </a>
  <a href="equipment.html" class="nav-item" data-nav="equipment.html">
    <i class="bi bi-truck"></i>機械
  </a>
  <a href="maintenance.html" class="nav-item" data-nav="maintenance.html">
    <i class="bi bi-tools"></i>整備
    <span id="overdueBadge" class="badge rounded-pill bg-danger" style="display:none"></span>
  </a>
  <a href="inventory.html" class="nav-item" data-nav="inventory.html">
    <i class="bi bi-box-seam"></i>在庫
    <span id="lowstockBadge" class="badge rounded-pill bg-warning" style="display:none"></span>
  </a>
  <a href="menu.html" class="nav-item" data-nav="menu.html">
    <i class="bi bi-grid"></i>メニュー
  </a>
</nav>

<!-- 確認ダイアログ -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body py-4 text-center" id="confirmMsg"></div>
      <div class="modal-footer border-0 justify-content-center gap-2">
        <button class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-danger px-4" id="confirmOkBtn">削除する</button>
      </div>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:1100">
  <div id="toast" class="toast align-items-center text-bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastBody"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
(async () => {
  const content = document.getElementById('content');
  try {
    const data = await API.getDashboard();
    const overdueRows = data.overdueSchedules.map(s => `
      <div class="list-item" onclick="location.href='schedule.html'">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <span class="badge bg-danger me-1">期限超過</span>
            <span class="title">${escHtml(s.equipment_name)} - ${escHtml(s.maintenance_type_name)}</span>
          </div>
          <small class="text-danger">${escHtml(s.scheduled_date)}</small>
        </div>
      </div>`).join('');

    const upcomingRows = data.upcomingSchedules.map(s => `
      <div class="list-item" onclick="location.href='schedule.html'">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <span class="badge bg-warning text-dark me-1">7日以内</span>
            <span class="title">${escHtml(s.equipment_name)} - ${escHtml(s.maintenance_type_name)}</span>
          </div>
          <small class="text-warning">${escHtml(s.scheduled_date)}</small>
        </div>
      </div>`).join('');

    const lowStockRows = data.lowStockItems.map(i => `
      <div class="list-item" onclick="location.href='inventory.html'">
        <div class="d-flex justify-content-between">
          <span class="title">${escHtml(i.name)}</span>
          <span class="stock-low">${escHtml(String(i.current_stock))} ${escHtml(i.unit)}（最低: ${escHtml(String(i.minimum_stock))}）</span>
        </div>
      </div>`).join('');

    const recentOpsRows = data.recentOps.map(op => `
      <div class="list-item">
        <div class="d-flex justify-content-between">
          <span class="title">${escHtml(op.equipment_name)}</span>
          <small class="text-muted">${escHtml(op.log_date)}</small>
        </div>
        <div class="sub">${escHtml(op.work_type || '')} ${op.field_name ? '/ ' + escHtml(op.field_name) : ''}</div>
      </div>`).join('');

    content.innerHTML = `
      <!-- 統計カード -->
      <div class="row g-2 mb-3">
        <div class="col-4">
          <div class="card stat-card">
            <div class="stat-num text-success">${data.equipmentCount}</div>
            <div class="stat-label">登録機械</div>
          </div>
        </div>
        <div class="col-4">
          <div class="card stat-card">
            <div class="stat-num ${data.overdueCount > 0 ? 'text-danger' : 'text-muted'}">${data.overdueCount}</div>
            <div class="stat-label">期限超過</div>
          </div>
        </div>
        <div class="col-4">
          <div class="card stat-card">
            <div class="stat-num ${data.lowStockCount > 0 ? 'text-warning' : 'text-muted'}">${data.lowStockCount}</div>
            <div class="stat-label">在庫不足</div>
          </div>
        </div>
      </div>

      ${data.overdueSchedules.length > 0 ? `
      <div class="section-header">
        <h6><i class="bi bi-exclamation-triangle-fill me-1"></i>期限超過の整備</h6>
        <a href="schedule.html" class="small text-success">すべて見る</a>
      </div>
      ${overdueRows}` : ''}

      ${data.upcomingSchedules.length > 0 ? `
      <div class="section-header mt-3">
        <h6><i class="bi bi-calendar-event me-1"></i>今後7日以内の整備</h6>
        <a href="schedule.html" class="small text-success">すべて見る</a>
      </div>
      ${upcomingRows}` : ''}

      ${data.lowStockItems.length > 0 ? `
      <div class="section-header mt-3">
        <h6><i class="bi bi-box-seam me-1"></i>在庫不足</h6>
        <a href="inventory.html" class="small text-success">すべて見る</a>
      </div>
      ${lowStockRows}` : ''}

      ${data.recentOps.length > 0 ? `
      <div class="section-header mt-3">
        <h6><i class="bi bi-activity me-1"></i>最近の稼働記録</h6>
        <a href="operation.html" class="small text-success">すべて見る</a>
      </div>
      ${recentOpsRows}` : ''}

      ${data.overdueSchedules.length === 0 && data.upcomingSchedules.length === 0 && data.lowStockItems.length === 0 ? `
      <div class="card mt-3">
        <div class="card-body text-center text-success py-4">
          <i class="bi bi-check-circle-fill" style="font-size:2rem"></i>
          <div class="mt-2">問題なし！すべて正常です</div>
        </div>
      </div>` : ''}
    `;
  } catch(e) {
    showError(content, 'データ読み込みエラー: ' + e.message);
  }
})();
</script>
</body>
</html>
